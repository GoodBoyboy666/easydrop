info:
  contact: {}
  description: 这是一个轻量级的说说服务
  title: EasyDrop API
  version: "1.0"
paths:
  /api/v1/admin/attachments:
    get:
      description: 分页查询附件列表，支持按用户、业务类型、上传时间区间过滤
      parameters:
      - description: 附件ID
        in: query
        name: id
        type: integer
      - description: 用户ID
        in: query
        name: user_id
        type: integer
      - description: 附件业务类型
        in: query
        name: biz_type
        type: integer
      - description: 上传时间起点（Unix秒）
        in: query
        name: created_from
        type: integer
      - description: 上传时间终点（Unix秒）
        in: query
        name: created_to
        type: integer
      - description: 分页大小
        in: query
        name: limit
        type: integer
      - description: 偏移量
        in: query
        name: offset
        type: integer
      - description: 排序，如 created_at_desc
        in: query
        name: order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.AttachmentListResult'
        "400":
          description: 参数校验失败
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: 未登录或登录失效
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 管理端查询附件列表
      tags:
      - attachment-admin
  /api/v1/admin/attachments/{id}:
    delete:
      description: 按附件 ID 删除任意用户附件
      parameters:
      - description: 附件ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "400":
          description: 参数校验失败
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "401":
          description: 未登录或登录失效
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "403":
          description: 无管理员权限
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "404":
          description: 附件不存在
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
        "500":
          description: 服务内部错误
          schema:
            $ref: '#/definitions/dto.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 管理端删除附件
      tags:
      - attachment-admin
  /api/v1/admin/attachments/batch-delete:
    post:
      consumes:
      - application/json
      description: 批量删除附件，返回成功与失败明细
      parameters:
      - description: 批量删除请求
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.AttachmentBatchDeleteInput'
      produces:
      - application/json
      responses:
        "200":
