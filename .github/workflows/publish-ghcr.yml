name: Publish Docker Image to GHCR

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build and Push GHCR Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          version_no_v="${version#v}"
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/easydrop"
          build_time="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          is_prerelease=false
          major_minor=""

          if [[ "${version_no_v}" == *-* ]]; then
            is_prerelease=true
          else
            IFS='.' read -r major minor _ <<< "${version_no_v}"
            major_minor="${major}.${minor}"
          fi

          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "version_no_v=${version_no_v}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${major_minor}" >> "$GITHUB_OUTPUT"
          echo "build_time=${build_time}" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${is_prerelease}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image }}
          tags: |
            type=raw,value=${{ steps.prep.outputs.version }}
            type=raw,value=${{ steps.prep.outputs.version_no_v }}
            type=raw,value=${{ steps.prep.outputs.major_minor }},enable=${{ steps.prep.outputs.is_prerelease == 'false' }}
            type=raw,value=latest,enable=${{ steps.prep.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.created=${{ steps.prep.outputs.build_time }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.prep.outputs.version }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            APP_VERSION=${{ steps.prep.outputs.version }}
            BUILD_TIME=${{ steps.prep.outputs.build_time }}
            GIT_COMMIT=${{ github.sha }}
