name: 功能请求
description: 提议新功能、体验优化或行为调整
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请优先说明“为什么需要这个功能”。背景越清楚，越容易判断是否应该进入实现。

  - type: textarea
    id: problem
    attributes:
      label: 背景与问题
      description: 当前遇到了什么限制、痛点或缺失？
      placeholder: |
        例如：
        目前后台附件管理只能逐个删除，大量清理历史附件时效率很低。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望系统新增什么能力，或者行为如何调整？
      placeholder: |
        例如：
        支持在后台附件列表中多选，并批量删除。
    validations:
      required: true

  - type: textarea
    id: value
    attributes:
      label: 预期收益
      description: 这个改动会给用户、维护者或部署者带来什么价值？
      placeholder: |
        例如：
        降低管理成本，减少重复操作。
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 相关模块
      options:
        - 后端
        - 前端
        - API
        - 管理后台
        - 配置 / 部署
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案或临时方案
      description: 是否考虑过其他实现方式？现在是否有可接受的替代方案？

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可附原型图、接口草案、参考项目、兼容性考虑等。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已搜索过现有 Issue，确认没有重复提议
          required: true
        - label: 我已尽量说明真实场景，而不是只描述想法本身
          required: true

