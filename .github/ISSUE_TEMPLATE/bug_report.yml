name: Bug 反馈
description: 提交可复现的问题、异常行为
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可复现信息。最有帮助的 Issue 不是“有问题”，而是“在哪、怎么复现、预期是什么、实际发生了什么”。

  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 用几句话说明问题现象和影响范围。
      placeholder: |
        例如：
        上传头像后接口返回 500，前端个人资料页无法保存。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 请按顺序写出复现过程。
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 提交 ...
        4. 看到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望结果
      placeholder: |
        例如：
        应返回 200，并成功更新头像。
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果
      placeholder: |
        例如：
        返回 500，日志中出现文件存储路径为空的报错。
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - 后端
        - 前端
        - API / Swagger
        - 配置 / 部署
        - 数据库 / 模型
        - 构建 / CI
        - 不确定
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志、报错或截图
      description: 请粘贴关键日志、报错堆栈、接口响应或截图。
      render: text

  - type: textarea
    id: env
    attributes:
      label: 运行环境
      description: 请尽量写清楚版本和运行方式。
      placeholder: |
        - OS:
        - Go 版本:
        - Node / pnpm 版本:
        - 数据库:
        - 启动方式: go run . / go run -tags embed_frontend . / Docker / 其他
        - 是否使用自定义配置:
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可填写问题版本、怀疑原因、临时绕过方案、相关 PR / Issue 等。

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已确认这不是本地配置错误或明显的使用问题
          required: true
        - label: 我已搜索过现有 Issue，确认没有重复反馈
          required: true
        - label: 我已尽量提供可复现信息或最小复现路径
          required: true

