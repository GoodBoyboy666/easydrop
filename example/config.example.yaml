email:
  host: "smtp.example.com"
  port: 587
  username: "user"
  password: ""
  from_email: "noreply@example.com"
  tls_mode: "starttls"
  connect_timeout: 10s
  send_timeout: 10s

jwt:
  private_key_path: "data/jwt/private.pem"
  public_key_path: "data/jwt/public.pem"
  issuer: "easydrop"
  expire: 1h
