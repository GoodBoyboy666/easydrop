# Example configuration for easydrop.
# Copy to data/config.yaml and edit for your environment.

server:
  # development: 本地开发（默认）；production: 生产环境
  mode: "development"
  addr: ":8080"
  # 可信代理列表。默认空数组表示关闭可信代理，不信任 X-Forwarded-For/X-Real-IP。
  # 生产环境部署在反向代理后时，填写代理网段或地址（如 "127.0.0.1", "10.0.0.0/8"）。
  trusted_proxies: []
  # 仅在请求来自 trusted_proxies 时，按以下顺序解析客户端真实IP。
  remote_ip_headers:
    - X-Forwarded-For
    - X-Real-IP
  read_timeout: 10s
  write_timeout: 15s
  shutdown_timeout: 5s

db:
  driver: sqlite
  sqlite_path: data/easydrop.db
  # host: "127.0.0.1"
  # port: 3306
  # username: "root"
  # password: ""
  # database_name: "easydrop"
  # ssl_mode: "disable"
  # charset: "utf8mb4"
  # parse_time: true
  # loc: "Local"
  # time_zone: "Asia/Shanghai"
  # max_open_conns: 20
  # max_idle_conns: 10
  # conn_max_lifetime: 1h
  # conn_max_idle_time: 10m

redis:
  # addr: "localhost:6379"
  # username: ""
  # password: ""
  # db: 0
  # dial_timeout: 5s
  # read_timeout: 3s
  # write_timeout: 3s
  # pool_size: 10
  # min_idle_conns: 2
  # max_retries: 3

email:
  enable: false
  # host: "smtp.example.com"
  # port: 587
  # username: "user"
  # password: ""
  # from_email: "noreply@example.com"
  # tls_mode: "starttls"
  # connect_timeout: 10s
  # send_timeout: 10s

jwt:
  private_key_path: "data/jwt/private.pem"
  public_key_path: "data/jwt/public.pem"
  issuer: "easydrop"
  expire: 1h

captcha:
  enabled: false
  provider: "turnstile"
  timeout: 5s
  turnstile:
    site_key: ""
    secret_key: ""
    verify_url: ""
  recaptcha:
    site_key: ""
    secret_key: ""
    verify_url: ""
  hcaptcha:
    site_key: ""
    secret_key: ""
    verify_url: ""
  geetest_v4:
    site_key: ""
    secret_key: ""
    verify_url: ""

storage:
  backend: "local" # local 或 s3
  local:
    base_path: "data/uploads"
    url_prefix: "" # /api 后面的可选前缀；留空时文件地址为 /api/file/... 和 /api/avatar/...
  s3:
    bucket: ""
    region: ""
    access_key: ""
    secret_key: ""
    endpoint: ""
    use_path_style: false
    public_base_url: ""
    presign_expire: 15m

token:
  key_prefix: "token"
