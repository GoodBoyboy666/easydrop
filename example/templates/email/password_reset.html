<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>重置密码</title>
</head>
<body style="margin:0;padding:0;background:#f3f6ff;font-family:'Segoe UI',Helvetica,Arial,sans-serif;color:#17223b;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:radial-gradient(circle at 10% 20%, #e7eeff 0%, #f3f6ff 48%, #eef6ff 100%);padding:28px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="620" cellspacing="0" cellpadding="0" style="max-width:620px;width:100%;background:#ffffff;border-radius:18px;overflow:hidden;border:1px solid #d9e4ff;box-shadow:0 18px 60px rgba(23,34,59,0.12);">
          <tr>
            <td style="padding:24px 28px;background:linear-gradient(135deg, #1f3cff 0%, #00a6ff 100%);color:#ffffff;">
              <p style="margin:0;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.9;">EasyDrop Security Center</p>
              <h1 style="margin:10px 0 0 0;font-size:26px;line-height:1.25;">重置密码</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;">
              <p style="margin:0 0 14px 0;font-size:15px;line-height:1.8;">我们收到了你的密码重置请求，请点击下方按钮继续操作。</p>
              <p style="margin:0 0 22px 0;font-size:14px;line-height:1.8;color:#42526e;">如果这不是你本人发起的操作，请忽略本邮件并立即检查账号安全。</p>

              <p style="margin:0 0 18px 0;">
                <a href="{{.ActionURL}}" style="display:inline-block;padding:13px 22px;border-radius:10px;text-decoration:none;font-weight:700;background:linear-gradient(135deg, #1f3cff 0%, #00a6ff 100%);color:#ffffff;">立即重置密码</a>
              </p>

              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f7f9ff;border:1px solid #dce5ff;border-radius:12px;">
                <tr>
                  <td style="padding:14px 16px;">
                    <p style="margin:0 0 8px 0;font-size:13px;color:#52607a;">若按钮无法点击，请复制以下链接到浏览器：</p>
                    <p style="margin:0 0 12px 0;font-size:13px;line-height:1.7;word-break:break-all;color:#1f3cff;">{{.ActionURL}}</p>
                    <p style="margin:4px 0 0 0;font-size:13px;line-height:1.7;">有效期：{{.TTL}}</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px;border-top:1px solid #edf1ff;background:#fbfcff;">
              <p style="margin:0;font-size:12px;line-height:1.7;color:#6f7b95;">来源站点：{{.SiteURL}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
